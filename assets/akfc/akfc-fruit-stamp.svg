    <text x="300" y="535" font-family="Georgia,serif" font-size="34" font-weight="700" letter-spacing="3">FRUIT CALENDAR</text>
    <text x="300" y="229" font-family="Courier New,monospace" font-size="19" font-weight="700" letter-spacing="2">YOUR MEMORIES</text>
    <text x="300" y="257" font-family="Courier New,monospace" font-size="19" font-weight="700" letter-spacing="2">IN A JAR</text>
    <text x="300" y="370" font-family="Courier New,monospace" font-size="16" font-weight="700" letter-spacing="2">HARVESTED IN KENYA</text>
  </g>
