<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Internal Signal | DALE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Syne:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" sizes="32x32" href="../../assets/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="192x192" href="../../assets/favicon-192x192.png">
<link rel="apple-touch-icon" sizes="512x512" href="../../assets/favicon-512x512.png">
<style>
/* ============================================================
   DESIGN TOKENS
   Internal Signal: field notebook register
   Deep teal ground, amber accent, strict grid
   ============================================================ */
:root {
  --ground:        #071416;
  --surface-0:     #0a1c1f;
  --surface-1:     #0e2428;
  --surface-2:     #122b30;
  --border:        rgba(255,255,255,0.07);
  --border-active: rgba(0,192,160,0.25);

  --teal:          #00c0a0;
  --teal-dim:      rgba(0,192,160,0.15);
  --teal-faint:    rgba(0,192,160,0.06);
  --amber:         #c96a00;
  --amber-dim:     rgba(201,106,0,0.15);
  --amber-faint:   rgba(201,106,0,0.06);
  --coral:         #f65f54;
  --coral-dim:     rgba(246,95,84,0.12);
  --green:         #3dba7e;
  --green-dim:     rgba(61,186,126,0.12);

  --text-0:        rgba(255,255,255,0.92);
  --text-1:        rgba(255,255,255,0.55);
  --text-2:        rgba(255,255,255,0.28);
  --text-teal:     #00c0a0;
  --text-amber:    #e07820;

  --mono:   'DM Mono', monospace;
  --sans:   'Syne', sans-serif;
  --serif:  'Cormorant Garamond', serif;

  --r:  2px;
  --t:  0.2s ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--ground);
  color: var(--text-0);
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ============================================================
   LAYOUT
   ============================================================ */
.shell {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 32px 80px;
}

/* ============================================================
   TOP BAR
   ============================================================ */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 48px;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 20px;
}

.wordmark {
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.25em;
  color: var(--text-1);
  text-decoration: none;
}
.wordmark em {
  color: var(--teal);
  font-style: normal;
}

.badge-internal {
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--amber);
  background: var(--amber-faint);
  border: 1px solid rgba(201,106,0,0.2);
  padding: 3px 8px;
  border-radius: var(--r);
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 24px;
}

.last-read {
  font-size: 10px;
  color: var(--text-2);
  letter-spacing: 0.1em;
}

.refresh-btn {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--teal);
  background: none;
  border: 1px solid var(--border-active);
  padding: 5px 12px;
  border-radius: var(--r);
  cursor: pointer;
  transition: all var(--t);
}
.refresh-btn:hover {
  background: var(--teal-faint);
}

/* ============================================================
   INTERNAL SECTION NAVIGATION
   ============================================================ */
.resource-nav {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: -28px 0 40px;
}

.resource-link,
.logout-link {
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-1);
  text-decoration: none;
  border: 1px solid var(--border);
  padding: 6px 10px;
  border-radius: var(--r);
  transition: all var(--t);
}

.resource-link:hover,
.resource-link:focus-visible,
.logout-link:hover,
.logout-link:focus-visible {
  color: var(--teal);
  border-color: var(--border-active);
  background: var(--teal-faint);
}

/* ============================================================
   THE READING — signature element
   Plain text field-report block. No glow. No gradients.
   Just the truth of the current state.
   ============================================================ */
.reading-block {
  border-left: 2px solid var(--teal);
  padding: 28px 32px;
  background: var(--surface-0);
  margin-bottom: 56px;
  position: relative;
}

.reading-label {
  font-size: 9px;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--teal);
  margin-bottom: 20px;
  font-family: var(--sans);
}

.reading-text {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 300;
  line-height: 1.75;
  color: var(--text-0);
}

.reading-text p { margin-bottom: 14px; }
.reading-text p:last-child { margin-bottom: 0; }

.reading-text .line-break {
  display: block;
  height: 10px;
}

.reading-text em {
  font-style: italic;
  color: var(--text-1);
}

.reading-stats {
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 32px;
  flex-wrap: wrap;
}

.rstat {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.rstat-n {
  font-family: var(--sans);
  font-size: 20px;
  font-weight: 600;
  color: var(--text-0);
}
.rstat-n.risk { color: var(--coral); }
.rstat-n.ok   { color: var(--teal); }
.rstat-n.warn { color: var(--amber); }

.rstat-l {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-2);
}

/* ============================================================
   NAV TABS
   ============================================================ */
.nav-tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 40px;
}

.tab {
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-2);
  padding: 10px 20px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all var(--t);
  user-select: none;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
}
.tab:hover { color: var(--text-1); }
.tab.active {
  color: var(--teal);
  border-bottom-color: var(--teal);
}

/* ============================================================
   TAB PANELS
   ============================================================ */
.panel { display: none; }
.panel.active { display: block; }

/* ============================================================
   CURRENT PANEL
   ============================================================ */
.current-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.section-block {
  background: var(--surface-0);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
}

.section-block.full-width {
  grid-column: 1 / -1;
}

.block-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface-1);
}

.block-title {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text-1);
}

.block-count {
  font-size: 10px;
  color: var(--text-2);
  letter-spacing: 0.1em;
}

.block-body {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* Canon item */
.canon-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: var(--r);
  cursor: pointer;
  transition: all var(--t);
}
.canon-item:hover {
  border-color: var(--border-active);
  background: var(--teal-faint);
}

.canon-name {
  font-size: 12px;
  color: var(--text-0);
  letter-spacing: 0.05em;
}

.canon-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.status-pill {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 20px;
}
.status-pill.active     { background: var(--green-dim);  color: var(--green);  border: 1px solid rgba(61,186,126,0.25); }
.status-pill.incomplete { background: var(--amber-dim);  color: var(--amber);  border: 1px solid rgba(201,106,0,0.3); }
.status-pill.inprogress { background: var(--teal-dim);   color: var(--teal);   border: 1px solid rgba(0,192,160,0.3); }
.status-pill.design     { background: var(--coral-dim);  color: var(--coral);  border: 1px solid rgba(246,95,84,0.25); }
.status-pill.present    { background: rgba(255,255,255,0.05); color: var(--text-1); border: 1px solid var(--border); }

.env-badge {
  font-size: 9px;
  color: var(--text-2);
  letter-spacing: 0.15em;
}

/* Validation environments */
.env-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--r);
}

.env-name {
  font-size: 12px;
  color: var(--text-0);
}

.env-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
}

.env-type {
  font-size: 9px;
  color: var(--text-2);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

/* Research / dev items */
.count-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: var(--r);
}
.count-label { font-size: 12px; color: var(--text-1); }
.count-n {
  font-family: var(--sans);
  font-size: 16px;
  font-weight: 600;
  color: var(--text-0);
}

/* ============================================================
   EVIDENCE PANEL
   ============================================================ */
.evidence-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.evidence-item {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 16px;
  align-items: start;
  padding: 14px 16px;
  background: var(--surface-0);
  border: 1px solid var(--border);
  border-radius: var(--r);
  cursor: pointer;
  transition: all var(--t);
}
.evidence-item:hover {
  border-color: var(--border-active);
  background: var(--teal-faint);
}

.ev-marker {
  font-size: 14px;
  color: var(--teal);
  margin-top: 1px;
  font-weight: 300;
  font-family: var(--serif);
}
.ev-marker.amber { color: var(--amber); }
.ev-marker.coral { color: var(--coral); }

.ev-body { }

.ev-title {
  font-size: 13px;
  color: var(--text-0);
  margin-bottom: 3px;
}

.ev-meta {
  font-size: 10px;
  color: var(--text-2);
  letter-spacing: 0.1em;
  display: flex;
  gap: 12px;
}

.ev-type {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-2);
  align-self: start;
  margin-top: 3px;
}

/* Evidence detail drawer */
.ev-drawer {
  display: none;
  margin-top: 8px;
  padding: 14px 16px;
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  border-left: 2px solid var(--teal);
}
.ev-drawer.open { display: block; }

.drawer-links {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.drawer-link {
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--teal);
  text-decoration: none;
  border: 1px solid var(--border-active);
  padding: 4px 10px;
  border-radius: var(--r);
  transition: all var(--t);
  cursor: pointer;
  background: none;
  font-family: var(--mono);
}
.drawer-link:hover {
  background: var(--teal-faint);
}

.drawer-note {
  font-size: 11px;
  color: var(--text-1);
  margin-top: 10px;
  line-height: 1.6;
  font-family: var(--serif);
  font-style: italic;
}

/* ============================================================
   GAPS PANEL
   ============================================================ */
.gaps-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.gap-item {
  display: grid;
  grid-template-columns: 3px 1fr;
  gap: 0;
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
}

.gap-stripe {
  background: var(--coral);
}
.gap-stripe.warn  { background: var(--amber); }
.gap-stripe.info  { background: var(--teal); }

.gap-content {
  padding: 12px 16px;
  background: var(--surface-0);
  display: flex;
  align-items: start;
  justify-content: space-between;
  gap: 16px;
}

.gap-left { flex: 1; }

.gap-type {
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--coral);
  margin-bottom: 4px;
}
.gap-type.warn { color: var(--amber); }
.gap-type.info { color: var(--teal); }

.gap-title {
  font-size: 13px;
  color: var(--text-0);
  margin-bottom: 3px;
}

.gap-desc {
  font-size: 11px;
  color: var(--text-1);
  line-height: 1.55;
}

.gap-artifact {
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--text-2);
  white-space: nowrap;
  margin-top: 2px;
}

/* ============================================================
   MOVEMENT PANEL
   ============================================================ */
.movement-header {
  font-size: 10px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text-2);
  margin-bottom: 20px;
  font-family: var(--sans);
}

.timeline {
  display: flex;
  flex-direction: column;
  gap: 0;
  position: relative;
  padding-left: 24px;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 5px;
  top: 8px;
  bottom: 8px;
  width: 1px;
  background: var(--border);
}

.timeline-item {
  position: relative;
  padding-bottom: 24px;
  padding-left: 20px;
}

.timeline-item::before {
  content: '';
  position: absolute;
  left: -19px;
  top: 6px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--surface-2);
  border: 1px solid var(--border);
}
.timeline-item.teal::before  { background: var(--teal);  border-color: var(--teal);  box-shadow: 0 0 6px rgba(0,192,160,0.4); }
.timeline-item.amber::before { background: var(--amber); border-color: var(--amber); }
.timeline-item.coral::before { background: var(--coral); border-color: var(--coral); }

.tl-date {
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--text-2);
  margin-bottom: 4px;
  text-transform: uppercase;
}

.tl-artifact {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-0);
  margin-bottom: 2px;
}

.tl-change {
  font-size: 12px;
  color: var(--text-1);
  margin-bottom: 4px;
}

.tl-env {
  display: inline-flex;
  gap: 6px;
}
.tl-env-tag {
  font-size: 9px;
  letter-spacing: 0.15em;
  color: var(--teal);
  background: var(--teal-faint);
  padding: 1px 6px;
  border-radius: 10px;
  border: 1px solid rgba(0,192,160,0.15);
}
.tl-env-tag.amber {
  color: var(--amber);
  background: var(--amber-faint);
  border-color: rgba(201,106,0,0.15);
}

/* ============================================================
   SIGNAL OBJECT DRAWER (modal)
   ============================================================ */
.object-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(7,20,22,0.92);
  z-index: 100;
  align-items: start;
  justify-content: center;
  padding-top: 60px;
  backdrop-filter: blur(4px);
}
.object-overlay.open { display: flex; }

.object-card {
  background: var(--surface-1);
  border: 1px solid var(--border-active);
  border-radius: var(--r);
  width: 540px;
  max-height: 80vh;
  overflow-y: auto;
}

.object-header {
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.object-name {
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 600;
  color: var(--text-0);
}

.object-close {
  background: none;
  border: none;
  font-size: 18px;
  color: var(--text-2);
  cursor: pointer;
  transition: color var(--t);
  line-height: 1;
  padding: 2px 6px;
}
.object-close:hover { color: var(--text-0); }

.object-body {
  padding: 20px;
}

.object-field {
  display: flex;
  align-items: start;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  gap: 16px;
}
.object-field:last-child { border-bottom: none; }

.field-key {
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-2);
  width: 140px;
  flex-shrink: 0;
  padding-top: 1px;
  font-family: var(--sans);
}

.field-val {
  font-size: 12px;
  color: var(--text-0);
  line-height: 1.6;
}

.field-val .multi {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

/* ============================================================
   SECTION DIVIDERS
   ============================================================ */
.section-divider {
  height: 1px;
  background: var(--border);
  margin: 40px 0;
}

/* ============================================================
   FOOTER
   ============================================================ */
.page-footer {
  margin-top: 60px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.footer-note {
  font-size: 10px;
  color: var(--text-2);
  letter-spacing: 0.1em;
}

.seed-badge {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--amber);
  background: var(--amber-faint);
  border: 1px solid rgba(201,106,0,0.2);
  padding: 3px 10px;
  border-radius: var(--r);
}

@media (max-width: 720px) {
  .shell { padding: 0 18px 48px; }
  .topbar { align-items: flex-start; margin-bottom: 38px; }
  .topbar-right { align-items: flex-end; gap: 10px; flex-direction: column; }
  .resource-nav { margin-top: -22px; }
  .reading-block { padding: 22px 20px; margin-bottom: 40px; }
  .reading-text { font-size: 19px; }
  .nav-tabs { overflow-x: auto; }
  .tab { flex: 0 0 auto; padding: 10px 14px; }
  .current-grid { grid-template-columns: 1fr; }
  .section-block.full-width { grid-column: auto; }
  .gap-content,
  .page-footer { align-items: flex-start; flex-direction: column; }
  .gap-artifact { white-space: normal; }
  .object-overlay { padding: 20px 12px; }
  .object-card { width: 100%; max-height: calc(100vh - 40px); }
}

@media (max-width: 440px) {
  .topbar { gap: 16px; flex-direction: column; }
  .topbar-right { align-items: flex-start; }
  .resource-link { flex: 1 1 calc(50% - 8px); }
  .reading-stats { gap: 20px; }
  .rstat { flex: 1 1 calc(50% - 20px); }
  .evidence-item { grid-template-columns: auto 1fr; }
  .ev-type { grid-column: 2; }
  .object-field { flex-direction: column; gap: 4px; }
  .field-key { width: auto; }
}
</style>
</head>
<body>

<div class="shell">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <a href="/" class="wordmark">dale<em>(a)</em></a>
      <span class="badge-internal">Build Signal</span>
    </div>
    <div class="topbar-right">
      <span class="last-read" id="lastRead">Reading as of —</span>
      <button class="refresh-btn" onclick="refreshReading()">↻ Refresh reading</button>
      <a class="logout-link" href="/logout">Log out</a>
    </div>
  </div>

  <nav class="resource-nav" aria-label="Internal sections">
    <a class="resource-link" href="/internal/">Signal Home</a>
    <a class="resource-link" href="/internal/canons/">Canons</a>
    <a class="resource-link" href="/internal/docs/">Research</a>
    <a class="resource-link" href="/internal/validation/">Validation</a>
    <a class="resource-link" href="/internal/developer/">Developer</a>
    <a class="resource-link" href="/internal/docs/audit/">Audit</a>
    <a class="resource-link" href="/admin/blog/">Blog CMS</a>
  </nav>

  <!-- THE READING -->
  <div class="reading-block">
    <div class="reading-label">Current</div>
    <div class="reading-text" id="readingText">
      <!-- populated by JS -->
    </div>
    <div class="reading-stats" id="readingStats">

/* ============================================================
   READING GENERATION
   Derives the plain-text reading from the seed data state.
   In future: replace with live read from D1 or CMS.
   ============================================================ */
function generateReading() {
  const canons = SIGNAL_OBJECTS.filter(o => o.category === "canon");
  const activeCanons = canons.filter(o => o.state === "active");
  const incompleteCanons = canons.filter(o => ["incomplete","design","inprogress"].includes(o.state));
  const openGaps = GAPS.filter(g => g.severity !== "info");
  const criticalGaps = GAPS.filter(g => g.severity === "critical");
  const newArtifacts = MOVEMENT.length;
  const activeEnvs = VALIDATION_ENVIRONMENTS.filter(e => e.status === "active");

  // Build the reading text
  const paragraphs = [];

  // Line 1: overall coherence
  if (activeCanons.length >= 3 && criticalGaps.length <= 2) {
    paragraphs.push("The DALE build is coherent.");
  } else {
    paragraphs.push("The DALE build is in active transition.");
  }

  // Line 2: evidence environments
  const envNames = activeEnvs.map(e => e.name);
  if (envNames.length > 0) {
    const envLines = envNames.map(n => `${n} is producing ${VALIDATION_ENVIRONMENTS.find(e=>e.name===n)?.type.toLowerCase()}.`).join(" ");
    paragraphs.push(envLines);
  }

  // Line 3: canon alignment
  const aligned = activeCanons.filter(c => c.envImpact.length > 0).map(c => c.name);
  const misaligned = incompleteCanons.map(c => c.name);
  if (aligned.length > 0 && misaligned.length > 0) {
    paragraphs.push(`${aligned.slice(0,2).join(" and ")} ${aligned.length > 2 ? "and others are" : "are"} aligned.\n${misaligned.join(" and ")} ${misaligned.length === 1 ? "is" : "are"} incomplete.`);
  }

  return paragraphs.join("\n\n");
}

function generateStats() {
  const openGaps = GAPS.filter(g => g.severity !== "info").length;
  const openDeps = GAPS.filter(g => g.severity === "info").length;
  const newArts = EVIDENCE_ITEMS.filter(e => {
    const d = new Date(e.date);
    const now = new Date("2026-06-09");
    return (now - d) / (1000*60*60*24) <= 7;
  }).length;
  const activeEnvs = VALIDATION_ENVIRONMENTS.filter(e => e.status === "active").length;

  return [
    { n: openGaps, label: "open risks", cls: openGaps > 2 ? "risk" : "warn" },
    { n: openDeps, label: "open dependencies", cls: "warn" },
    { n: newArts,  label: "new artifacts this week", cls: "ok" },
    { n: activeEnvs, label: "active environments", cls: "ok" }
  ];
}

/* ============================================================

function openObject(id) {
  const obj = SIGNAL_OBJECTS.find(o => o.id === id);
  if (!obj) return;

  document.getElementById("objectName").textContent = obj.name;

  const envTags = obj.envImpact.length
    ? obj.envImpact.map(e => `<span class="tl-env-tag">${e}</span>`).join(" ")
    : "—";

  const fields = [
    { key: "State",            val: `<span class="status-pill ${obj.state}">${obj.state}</span>` },
    { key: "H (Human Canon)",  val: obj.h },
    { key: "Developer",        val: obj.developer },
    { key: "Machine",          val: obj.machine },
    { key: "Status",           val: obj.status },
    { key: "Evidence",         val: obj.evidence },
    { key: "Last Change",      val: obj.lastChange },
    { key: "Environment Impact", val: `<div class="multi">${envTags}</div>` },
    { key: "Note",             val: `<em style="color:var(--text-1);font-style:italic">${obj.note}</em>` }
  ];

  document.getElementById("objectBody").innerHTML = fields.map(f => `
    <div class="object-field">
      <span class="field-key">${f.key}</span>
      <span class="field-val">${f.val}</span>
    </div>
  `).join("");

  document.getElementById("objectOverlay").classList.add("open");
}

function closeObject() {
  document.getElementById("objectOverlay").classList.remove("open");
}

document.getElementById("objectOverlay").addEventListener("click", function(e) {
  if (e.target === this) closeObject();
});

  document.getElementById("panel-" + name).classList.add("active");
  btn.classList.add("active");
}
