# DALE Master Canon Output
# CTS-Compliant Canonical Record
# Version: 1.0.0
# Standard basis: CTS / URT v1.0.0

metadata:
  artifact_id: master_canon_output
  artifact_name: DALE Master Canon Output
  version: "1.0.0"
  purpose: >
    Provide a shared CTS-compliant output envelope for all DALE canons while
    preserving each canon's local output record.
  schema_ref: master_canon_output_schema.json
  priority_formats:
    - json
    - yaml
    - html

canonical_sequence:
  - COS
  - ECOA
  - ARA
  - RUNNER
  - SEC
  - CBC
  - CTS
  - OUTCOME

core_rule:
  statement: >
    Local canon schemas remain authoritative for local meaning. The master canon
    output makes each local record CTS-compliant by adding trace, runtime,
    governance, confidence, temporal, contradiction, missingness, and
    reconstruction fields.

required_master_record:
  master_output_id: "MCO-[LAYER]-[SEQUENCE]"
  cts_trace: required
  canon_context: required
  urt_mapping: required
  contradictions: required_array
  missingness: required_array
  continuity: required
  local_record: required
  validation: required

cts_trace_envelope:
  required_fields:
    id: "CTS-[LAYER]-[OBJECT]-[SEQUENCE]"
    type: "CTS object class"
    layer: "COS | ECOA | ARA | RUNNER | SEC | CBC | CTS | OUTCOME"
    root_id: "Persistent root lineage identifier"
    source_local_id: "Original local canon identifier"
    runtime_state: "URT runtime state"
    governance_state: "CTS governance state"
    confidence_state: "CTS confidence state"
    validity_status: "ACTIVE | SUPERSEDED | INVALIDATED | ARCHIVED | CONTESTED"
    authority_reference: "Authority, steward, or UNKNOWN_AUTHORITY"
    created_at: "ISO 8601 datetime"
    trace_status: "COMPLETE | PARTIAL | BROKEN | PENDING_RECONSTRUCTION"
  optional_but_expected_fields:
    parent_id: "Immediate upstream object when applicable"
    updated_at: "ISO 8601 datetime"
    lineage_depth: "Integer lineage depth from root"
    child_references: "Known downstream CTS ids"

urt_runtime_states:
  - ACTIVE
  - STABLE
  - ADAPTING
  - DEGRADED
  - FRAGILE
  - BLOCKED
  - CONTESTED
  - ESCALATING
  - STALLED
  - COLLAPSED
  - SUPERSEDED
  - ARCHIVED

governance_states:
  - LEGITIMATE
  - CONTESTED
  - FRAGMENTED
  - DELEGATED
  - CENTRALIZED
  - DISTRIBUTED
  - COLLAPSED

confidence_states:
  - HIGH_CONFIDENCE
  - MODERATE_CONFIDENCE
  - LOW_CONFIDENCE
  - CONTESTED_CONFIDENCE
  - UNVERIFIABLE

standard_correction_fields:
  missingness:
    required: true
    rule: "Record absence, uncertainty, conflict, suppression, inaccessible evidence, and unknown origin."
    classes:
      - UNOBSERVED
      - INACCESSIBLE
      - CONFLICTING
      - TEMPORAL_GAP
      - INVALIDATED
      - SUPPRESSED
      - DEGRADED
      - UNKNOWN_SOURCE
  contradictions:
    required: true
    rule: "Record unresolved structural tensions. Do not collapse them into resolved states."
    classes:
      - RESOURCE
      - GOVERNANCE
      - STRUCTURAL
      - OPERATIONAL
      - TEMPORAL
      - INCENTIVE
      - INFORMATIONAL
      - REGULATORY
      - CULTURAL
      - ENVIRONMENTAL
  continuity:
    required: true
    fields:
      - dependency_state
      - adaptation_state
      - outcome_state
      - temporal_status
      - valid_from
      - valid_until
      - reconstruction_path
      - propagation_chain

canon_output_profiles:
  COS:
    dale_stage: Observe
    default_object_class: OBSERVATION_OBJECT
    local_id_candidates: [observation_id, condition_id, input_id]
    corrections:
      - Add CTS root_id and parent_id.
      - Add governance_state and authority_reference.
      - Add confidence_state.
      - Map observation status to URT runtime_state.
      - Preserve missingness explicitly.
  ECOA:
    dale_stage: Structure
    default_object_class: VARIABLE_OBJECT
    local_id_candidates: [observation_package_id, variable_id, output_id]
    corrections:
      - Add CTS root_id and parent_id.
      - Add governance_state and authority_reference.
      - Add confidence_state.
      - Normalize absence conditions as missingness.
      - Map structural state to URT runtime_state.
  ARA:
    dale_stage: Resolve
    default_object_class: REGIME_OBJECT
    local_id_candidates: [stage2_output_id, runtime_transfer_id, trace_id]
    corrections:
      - Add full CTS trace envelope.
      - Normalize contradictions.
      - Map resolution and regime states to URT.
      - Add governance and confidence states.
      - Preserve reconstruction_path and propagation_chain.
  RUNNER:
    dale_stage: Execute
    default_object_class: STATE_OBJECT
    local_id_candidates: [runtime_output_id, runtime_trace_id, realization_id]
    corrections:
      - Create missing YAML and HTML formats.
      - Enforce CTS runtime, adaptation, temporal, and reconstruction fields.
      - Map runtime status, realization state, divergence, recovery, and continuity states to URT.
      - Preserve execution chronology and prior state references.
  SEC:
    dale_stage: Realize
    default_object_class: CANON_OUTPUT_RECORD
    local_id_candidates: [observation_id, sip_id, ess_id, efm_id, csm_id, oae_id, csm2_id, ctp_id]
    corrections:
      - Add CTS trace envelope to all output records.
      - Map RES-* coherence states to URT.
      - Add authority_reference and confidence_state.
      - Preserve unresolved conditions as missingness or contradictions.
      - Preserve CBC transition reconstruction path.
  CBC:
    dale_stage: Formalize
    default_object_class: DECISION_OBJECT
    local_id_candidates: [observation_id, gip_id, gss_id, gfm_id, gcm_id, gae_id, gcam_id, gap_id]
    corrections:
      - Add CTS trace envelope to all output records.
      - Map governance coherence states to URT.
      - Add confidence_state and authority_reference.
      - Preserve obligation, value, trust, and authority flow tensions.
      - Preserve governance accessibility reconstruction path.
  CTS:
    dale_stage: Trace
    default_object_class: TRACE_OBJECT
    local_id_candidates: [id, event_id, propagation_id]
    corrections:
      - Create missing YAML and HTML formats.
      - Publish this master output envelope as the reusable implementation layer.

validation_domains:
  - Lineage_Integrity
  - Runtime_Continuity
  - Contradiction_Persistence
  - Missingness_Continuity
  - Governance_Attribution
  - Temporal_Integrity
  - Adaptation_Coherence
  - Cross_Canonical_Coherence
  - Machine_Representation
  - Reconstruction_Capability

compliance_rules:
  - Every master output must preserve the local canon record under local_record.
  - Every master output must include a CTS trace envelope.
  - Every master output must include a URT mapping from local state to runtime_state.
  - Empty contradiction and missingness arrays are allowed only when explicitly verified.
  - Unknown governance must be represented, not omitted.
  - Unknown confidence must be represented as UNVERIFIABLE or LOW_CONFIDENCE.
  - Timestamps must be ISO 8601.
  - Reconstruction path must be sufficient to trace backward toward observation origin.
  - Propagation chain must show known downstream or cross-canon movement.
  - The master output may correct representation, but must not invent local canon substance.

example_record_shape:
  master_output_id: MCO-SEC-0001
  cts_trace:
    id: CTS-SEC-OUTPUT-0001
    type: CANON_OUTPUT_RECORD
    layer: SEC
    root_id: CTS-COS-OBS-0001
    parent_id: CTS-RUNNER-STATE-0001
    source_local_id: SEC-20260519-0001
    runtime_state: STABLE
    governance_state: LEGITIMATE
    confidence_state: MODERATE_CONFIDENCE
    validity_status: ACTIVE
    authority_reference: Kadana Foundation
    created_at: "2026-05-19T00:00:00Z"
    trace_status: COMPLETE
  canon_context:
    canon_id: SEC
    canon_name: Social Enterprise Canvas
    canon_version: "1.0.0"
    dale_stage: Realize
    source_schema: sec_schema.json
    source_format: json
  urt_mapping:
    local_state_field: coherence_state
    local_state_value: RES-C
    urt_runtime_state: STABLE
    mapping_confidence: MODERATE_CONFIDENCE
    mapping_basis: SEC coherent state maps to URT stable state.
  contradictions: []
  missingness: []
  continuity:
    dependency_state: STABLE
    adaptation_state: NONE
    outcome_state: NOT_APPLICABLE
    temporal_status: CURRENT
    valid_from: "2026-05-19T00:00:00Z"
    valid_until: null
    reconstruction_path:
      - CTS-SEC-OUTPUT-0001
      - CTS-RUNNER-STATE-0001
      - CTS-ARA-REG-0001
      - CTS-ECOA-VAR-0001
      - CTS-COS-OBS-0001
    propagation_chain:
      - CTS-CBC-DECISION-0001
  local_record: {}
  validation:
    cts_compliant: true
    validation_domains_checked:
      - Lineage_Integrity
      - Runtime_Continuity
      - Governance_Attribution
      - Temporal_Integrity
      - Machine_Representation
      - Reconstruction_Capability
    open_corrections: []
    validation_notes: Example only; local_record must contain the source canon output.
