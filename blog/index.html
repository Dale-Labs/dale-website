<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Essays, field notes, and systems inquiries from DALE.">
<title>DALE Systems Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32x32.png">
<style>
*,*::before,*::after{box-sizing:border-box}:root{--bg:#071416;--text:#e8f0f1;--muted:#93b4b9;--dim:#5f8c93;--coral:#f65f54;--border:rgba(127,168,174,.22);--panel:rgba(14,76,82,.1)}
body{margin:0;background:var(--bg);color:var(--text);font-family:"Nunito",Arial,sans-serif;line-height:1.75}a{color:inherit}.site-nav{display:flex;align-items:center;justify-content:space-between;gap:2rem;padding:1.2rem clamp(1.2rem,4vw,3rem);border-bottom:1px solid rgba(127,168,174,.14)}.nav-logo{font-family:"Marcellus",Georgia,serif;font-size:1.35rem;letter-spacing:.05em;text-decoration:none}.nav-logo span,.eyebrow,.kicker{color:var(--coral)}.nav-links{display:flex;flex-wrap:wrap;gap:1rem 2rem;list-style:none;margin:0;padding:0}.nav-links a,.footer-links a{color:var(--muted);font-size:.76rem;font-weight:800;letter-spacing:.12em;text-decoration:none;text-transform:uppercase}.nav-links a:hover,.footer-links a:hover{color:var(--text)}
main{max-width:1120px;margin:0 auto;padding:clamp(4rem,9vw,8rem) clamp(1.2rem,4vw,2.5rem)}.eyebrow,.kicker{font-size:.72rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase}h1,h2,h3{font-family:"Marcellus",Georgia,serif;font-weight:400;line-height:1.12}h1{max-width:900px;margin:.8rem 0 1.2rem;font-size:clamp(2.8rem,7vw,6rem)}.subtitle{max-width:720px;margin:0;color:var(--muted);font-size:clamp(1.05rem,2vw,1.25rem)}.series{margin-top:clamp(4rem,9vw,7rem)}h2{margin:0 0 1.7rem;font-size:clamp(1.8rem,4vw,3rem)}
.articles{display:grid;gap:1rem}.article-card{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:2rem;padding:clamp(1.5rem,4vw,3rem);border:1px solid var(--border);background:var(--panel);text-decoration:none;transition:border-color .2s ease,background .2s ease}.article-card:hover{border-color:rgba(246,95,84,.5);background:rgba(14,76,82,.17)}h3{margin:.8rem 0 1rem;font-size:clamp(1.7rem,4vw,2.7rem)}.excerpt{max-width:720px;margin:0;color:var(--muted)}.date{color:var(--dim);font-size:.72rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;white-space:nowrap}.tags{display:flex;flex-wrap:wrap;gap:.45rem;margin-top:1.2rem}.tag{padding:.25rem .5rem;border:1px solid var(--border);color:var(--muted);font-size:.68rem}.cta{display:inline-block;margin-top:1.5rem;color:var(--coral);font-size:.76rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase}.empty,.error{padding:1.5rem;border:1px solid var(--border);color:var(--muted)}
footer{max-width:1120px;margin:0 auto;padding:3rem clamp(1.2rem,4vw,2.5rem);border-top:1px solid var(--border);display:flex;justify-content:space-between;gap:2rem;color:var(--dim);font-size:.8rem}.footer-links{display:flex;flex-wrap:wrap;gap:1rem 1.6rem}@media(max-width:700px){.site-nav,footer{align-items:flex-start;flex-direction:column}.article-card{grid-template-columns:1fr}.date{grid-row:1}}
</style>
</head>
<body>
<nav class="site-nav" aria-label="Primary navigation"><a class="nav-logo" href="../">dale<span>(a)</span></a><ul class="nav-links"><li><a href="../">Home</a></li><li><a href="../#tools">Tools</a></li><li><a href="../research/">Research</a></li><li><a href="./" aria-current="page">Blog</a></li></ul></nav>
<main>
  <header><p class="eyebrow">DALE Systems Lab</p><h1>DALE Systems Lab</h1><p class="subtitle">Essays, field notes, and systems inquiries from DALE.</p></header>
  <section class="series" aria-labelledby="articles-title"><h2 id="articles-title">Published articles</h2><div class="articles" id="articles"><p class="empty">Loading articles…</p></div></section>
</main>
<footer><div class="nav-logo">dale<span>(a)</span></div><nav class="footer-links" aria-label="Footer navigation"><a href="../">Home</a><a href="./">Blog</a><a href="../research/">Research</a><a href="mailto:hello@dale.africa">Contact</a></nav></footer>
<script>
const container=document.getElementById("articles");
const escapeHtml=value=>String(value||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
const formatDate=value=>new Intl.DateTimeFormat("en",{month:"long",year:"numeric",timeZone:"UTC"}).format(new Date(value+"T00:00:00Z"));
fetch("/api/blog/").then(async response=>{const data=await response.json();if(!response.ok)throw new Error(data.error||"Unable to load articles.");return data}).then(articles=>{
  if(!articles.length){container.innerHTML='<p class="empty">No articles are published yet.</p>';return}
  container.innerHTML=articles.map(article=>`<a class="article-card" href="/blog/${encodeURIComponent(article.slug)}"><div><p class="kicker">${escapeHtml(article.category)}</p><h3>${escapeHtml(article.title)}</h3><p class="excerpt">${escapeHtml(article.excerpt)}</p><div class="tags">${article.tags.map(tag=>`<span class="tag">${escapeHtml(tag)}</span>`).join("")}</div><span class="cta">Read article</span></div><p class="date">${formatDate(article.date)}</p></a>`).join("");
}).catch(error=>container.innerHTML=`<p class="error">${escapeHtml(error.message)}</p>`);
</script>
</body>
</html>
